# Senz production nginx template.
# Replace:
#   - server_name with your domain or IP
#   - root with the absolute path to dist/public on your server
#
# After editing:
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
  listen 80;
  server_name 124.222.202.18;

  root /var/www/senz-website/dist/public;
  index index.html;

  # JS/CSS/HTML text compression. Do not gzip videos.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  # Enable only if nginx was built with ngx_brotli.
  # brotli on;
  # brotli_comp_level 5;
  # brotli_types
  #   text/plain
  #   text/css
  #   application/javascript
  #   application/json
  #   image/svg+xml;

  # Vite output filenames are content-hashed, so they can be cached for a year.
  location /assets/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Static media. Keep filenames versioned/hashed before replacing content.
  # Nginx supports Range requests for mp4 by default when serving static files.
  location /manus-storage/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Accept-Ranges bytes always;
  }

  # Other static images/fonts can also be cached.
  location ~* \.(?:png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Never long-cache the SPA shell: it points to the latest hashed JS/CSS.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # React/Vite client-side routes.
  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
